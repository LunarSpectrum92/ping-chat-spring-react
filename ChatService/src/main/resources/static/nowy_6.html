<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private Chat (STOMP Demo)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

<div id="chat-container" class="w-full max-w-lg bg-white shadow-2xl rounded-xl p-6 space-y-6">
    <h1 class="text-3xl font-bold text-gray-800 text-center">STOMP Private Chat (Test)</h1>

    <!-- Connection -->
    <div class="p-4 border border-gray-200 rounded-lg space-y-3">
        <h2 class="text-xl font-semibold text-gray-700">Connection</h2>
        <input id="userId" type="text" placeholder="Your user ID (e.g. Alice)"
               class="w-full p-2 border border-gray-300 rounded-lg shadow-sm" />
        <div class="flex space-x-2">
            <button id="connectButton" onclick="connect()"
                    class="flex-1 px-4 py-2 bg-green-600 text-white font-semibold rounded-lg shadow-md">Connect</button>
            <button id="disconnectButton" onclick="disconnect()"
                    class="flex-1 px-4 py-2 bg-red-600 text-white font-semibold rounded-lg shadow-md" disabled>Disconnect</button>
        </div>
        <p id="status">Status:
            <span id="connection-status" class="text-red-500 font-semibold">Disconnected</span>
        </p>
    </div>

    <!-- Message form -->
    <div class="p-4 border border-gray-200 rounded-lg space-y-3">
        <h2 class="text-xl font-semibold text-gray-700">Send Private Message</h2>
        <input id="recipientId" type="text" placeholder="Recipient user ID (e.g. Bob)"
               class="w-full p-2 border border-gray-300 rounded-lg shadow-sm" />
        <textarea id="messageContent" rows="3" placeholder="Type your message..."
                  class="w-full p-2 border border-gray-300 rounded-lg shadow-sm resize-none"></textarea>
        <button id="sendButton" onclick="sendPrivateMessage()"
                class="w-full px-4 py-3 text-lg bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-md"
                disabled>Send Message</button>
    </div>

    <!-- Messages -->
    <div class="space-y-2">
        <h2 class="text-xl font-semibold text-gray-700">Logs & Messages</h2>
        <div id="messages"
             class="h-64 overflow-y-auto bg-gray-100 p-3 rounded-lg border border-gray-300 text-sm space-y-1">
            <p class="text-gray-500">Awaiting connection...</p>
        </div>
    </div>
</div>

<script>
    const HOST = 'http://localhost:8083'; // zmień jeśli Twój backend działa na innym porcie
    let stompClient = null;

    function log(message, type = 'info') {
        const div = document.getElementById('messages');
        const p = document.createElement('p');
        let color = 'text-gray-700';
        if (type === 'error') color = 'text-red-600 font-semibold';
        if (type === 'success') color = 'text-green-600 font-semibold';
        if (type === 'received') color = 'text-blue-600 bg-blue-50 p-1 rounded';
        p.className = color;
        p.textContent = message;
        div.appendChild(p);
        div.scrollTop = div.scrollHeight;
    }

    function setConnected(connected) {
        const status = document.getElementById('connection-status');
        const connectBtn = document.getElementById('connectButton');
        const disconnectBtn = document.getElementById('disconnectButton');
        const sendBtn = document.getElementById('sendButton');
        const userInput = document.getElementById('userId');

        if (connected) {
            status.textContent = 'Connected';
            status.className = 'text-green-500 font-semibold';
            connectBtn.disabled = true;
            disconnectBtn.disabled = false;
            sendBtn.disabled = false;
            userInput.disabled = true;
        } else {
            status.textContent = 'Disconnected';
            status.className = 'text-red-500 font-semibold';
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            sendBtn.disabled = true;
            userInput.disabled = false;
        }
    }

    function connect() {
        const userId = document.getElementById('userId').value.trim();
        if (!userId) {
            log('Enter your user ID before connecting.', 'error');
            return;
        }

        // 1. Create SockJS connection
        const socket = new SockJS(`${HOST}/ws?authId=`+ userId +``);
        stompClient = Stomp.over(socket);

        // 2. Connect to STOMP
        stompClient.connect(
            { 'X-AuthId-Header': userId }, // symulacja nagłówka auth
            (frame) => {
                log('Connected: ' + frame, 'success');
                setConnected(true);

                // 3. Subscribe to user private queue
                stompClient.subscribe(`/user/${userId}/private`, (message) => {
                    const msg = JSON.parse(message.body);
                    log(`RECEIVED from ${msg.sender}: ${msg.content}`, 'received');
                });
            },
            (error) => {
                log('Connection error: ' + error, 'error');
                setConnected(false);
            }
        );
    }

    function disconnect() {
        if (stompClient) {
            stompClient.disconnect(() => {
                log('Disconnected.', 'info');
                setConnected(false);
            });
        }
    }

    function sendPrivateMessage() {
        const sender = document.getElementById('userId').value.trim();
        const recipient = document.getElementById('recipientId').value.trim();
        const content = document.getElementById('messageContent').value.trim();

        if (!recipient || !content) {
            log('Recipient and message content are required.', 'error');
            return;
        }

        const msg = { sender, recipient, content };
        stompClient.send('/app/private-message', {}, JSON.stringify(msg));
        log(`SENT to ${recipient}: ${content}`, 'info');
        document.getElementById('messageContent').value = '';
    }

    setConnected(false);
</script>
</body>
</html>
