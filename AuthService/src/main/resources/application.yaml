spring:
  application:
    name: AuthService
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: create-drop
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/AuthDb
    username: ${POSTGRE_USERNAME}
    password: ${POSTGRE_PASSWORD}
    driverClassName: org.postgresql.Driver


jwt:
  secret: ${JWT_SECRET}
  refreshExpirationMs: 86400000


server:
  port: 8081