  spring:
    application:
      name: ApiGetaway


    cloud:
      gateway:
        server:
          webflux:
            routes:
              - id: auth-service
                uri: http://${AUTH_SERVICE_HOST:localhost}:8081
                predicates:
                  - Path=/auth/**
              - id: user-service
                uri: http://${USER_SERVICE_HOST:localhost}:8082
                predicates:
                  - Path=/user/**
              - id: chat-service
                uri: http://${CHAT_SERVICE_HOST:localhost}:8083
                predicates:
                  - Path=/message/**
              - id: chat-websocket
                uri: http://${CHAT_SERVICE_HOST:localhost}:8083
                predicates:
                    - Path=/ws/**
            default-filters:
              - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials


  jwt:
    secret: ${JWT_SECRET}


  server:
    port: 8080