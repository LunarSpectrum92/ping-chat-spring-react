
services:
  postgres_user:
    image: postgres:latest
    container_name: postgres_user_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: UserDb
    ports:
      - "5432:5432"
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - app_network

  postgres_auth:
    image: postgres:latest
    container_name: postgres_auth_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: AuthDb
    ports:
      - "5433:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data
    networks:
      - app_network

  mongodb:
    image: mongo:latest
    container_name: mongo_chat_db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: mongodb_chat_db
    ports:
      - "27017:27017"
    volumes:
      - chat_data:/data/db
    networks:
      - app_network


  auth-service:
    build:
      context: .
      dockerfile: Docker/AuthService/Dockerfile
    environment:
      - DB_HOST=postgres_auth
      - USER_HOST=user-service
      - DB_PORT=5432
    ports:
      - "8081:8081"
    networks:
      - app_network
    depends_on:
      postgres_auth:
        condition: service_started


  user-service:
    build:
      context: .
      dockerfile: Docker/UserService/Dockerfile
    environment:
      - DB_HOST=postgres_user
      - DB_PORT=5432
    ports:
      - "8082:8082"
    networks:
      - app_network
    depends_on:
      postgres_user:
        condition: service_started

  chat-service:
    build:
      context: .
      dockerfile: Docker/ChatService/Dockerfile
    environment:
      - DB_HOST=mongodb
      - DB_PORT=27017
    ports:
      - "8083:8083"
    networks:
      - app_network
    depends_on:
      mongodb:
        condition: service_started


  api-gateway:
    build:
      context: .
      dockerfile: Docker/ApiGetaway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_HOST=auth-service
      - USER_SERVICE_HOST=user-service
      - CHAT_SERVICE_HOST=chat-service
    networks:
      - app_network
    depends_on:
      chat-service:
        condition: service_started
      user-service:
        condition: service_started
      auth-service:
        condition: service_started


  chat-frontend:
    build:
      context: .
      dockerfile: Docker/ChatFrontend/Dockerfile
    ports:
      - "5173:80"
    networks:
      - app_network
    depends_on:
      api-gateway:
        condition: service_started



networks:
  app_network:
    driver: bridge

volumes:
  user_data:
  auth_data:
  chat_data:
